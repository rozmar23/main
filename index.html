<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Main/style.css">
    <link rel="icon" type="image/png" href="/images/favicon.ico">
    <title>WiAutoClicker - Windows 7 Edition</title>
</head>
<body>

<img class="main-bg" src="/images/background.jpg" alt="">

<header class="topbar">
    <div class="container header-flex">
        <div class="logo">
            <img src="/images/logo.png" alt="">
            <span>EcoForums</span>
        </div>
        <nav class="navigation">
            <a href="#">Main</a>
            <a href="#">Download</a>
            <a href="#">Support</a>
        </nav>
    </div>
</header>

<div class="container">
    <div class="aero-window">
        <div class="aero-header">
            <h2>Announcements</h2>
        </div>
        <div class="inner-content">
            We would like to introduce our new Auto Clicker App. 
            <br><br>
            <a href="#" class="aero-button">Download Now</a>
        </div>
    </div>

    <div class="aero-window">
        <div class="aero-header">
            <h2>Support & Feedback</h2>
        </div>
        <div class="inner-content">
            If you spot any issues please 
            <a href="#">Contact us</a>. We are here to help!
        </div>
    </div>
</div>

</body>
</html>
